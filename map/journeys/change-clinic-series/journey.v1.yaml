id: v1
title: Change clinic series

step_order:
  - clinic-overview-page
  - change-properties
  - affected-clinics
  - affected-booking
  - check-answers
  - success

journey_findings:
  insights:
    - When we talked through the rules, participants were clear that edits to series times or vaccinators should not overwrite edits that had already been made to child clinics.

findings:
  - scope: step
    step: clinic-overview-page
    insights:
      - People found it easy to identify the clinic series they wanted to change.
      - Participants quickly understood what availability the site had, but that depended heavily on the clear clinic and series names that had been given.
      - Participants talked about wanting a clearer way to find child clinics that had not been updated if they later wanted to bring them back in line with the series.
    next_steps:
      - Update the list of clinics to show child edits for times, vaccinators, and services, and/or add a list to the clinic overview screen.
      - Introduce a link to edit the child clinics so users can quickly jump between parent and child.
      - Add a "remove clinic series" flow.

  - scope: step
    step: affected-clinics
    insights:
      - People often skipped this page unless the heading immediately signalled risk or change.
      - Users rarely read the full body copy when the main action sat below the fold.
      - Only 2 participants confidently made the connection between the edit they had made to the child clinic and the message displayed here.
      - When users scanned this page, the reason why the clinic had not been updated was no longer obvious enough.
    next_steps:
      - Remove the warning screen.
      - Move this information to the success screen

  - scope: variant
    step: check-answers
    variant: start-and-end-times
    insights:
      - Users look for the changed values before they read the supporting labels.
      - The Check your answers page felt too ambiguous when people were changing an existing value, because they were unsure whether the summary referred to the appointments being cancelled or the clinic time itself.
    next_steps:
      - Add text on the Check your answers page to show the previous value.
      - Include information about the number of bookings that will be cancelled, similar to the cancel a date range design.

  - scope: cross-step
    steps:
      - affected-clinics
      - affected-booking
      - check-answers
    insights:
      - Once the journey started talking about risk or cancellations, participants became more cautious throughout the rest of the flow.

  - scope: step
    step: success
    insights:
      - Users appreciated knowing whether the change had already been applied to future clinics.
    next_steps:
      - Show a list of the child clinics that have not been updated on the success screen.
