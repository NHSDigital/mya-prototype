  v2:
    summary: Users enter the new properties for the clinic series.
    default_variant: start-and-end-times
    implementation:
      ticket:
        label: APPT-2873
      user_story:
        - As a site administrator
        - I need to edit a clinic series
        - So that I can manage future availability
      prototype_link:
        label: Start and end times
        href: /site/clinics/edit/clinic-times
      notable_components:
        - label: Time input (custom component)
      acceptance_criteria:
        - id: AC7
          given: a user chooses to edit the clinic times
          when: the page loads
          then:
            - the current clinic times are shown in the start and end time inputs in 24 hour time format
        - id: AC8
          given: a user chooses to edit the clinic times
          when: the page loads
          then:
            - I can tab between input boxes, starting with start time hour
      notes: |
        Some notes here for implementation purposes.
